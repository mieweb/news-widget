name: Publish to NPM

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (leave empty to use package.json version)'
        required: false
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linter
        run: npm run lint
      
      - name: Run tests
        run: |
          npx playwright install --with-deps
          npm test
      
      - name: Build library
        run: npm run build:lib
      
      - name: Verify build output
        run: |
          ls -la dist/
          test -f dist/news-widget.js || exit 1
          test -f dist/news-widget.umd.cjs || exit 1
          test -f dist/news-widget.css || exit 1
          test -f dist/index.d.ts || exit 1
      
      - name: Update version (if specified)
        if: inputs.version != ''
        run: npm version ${{ inputs.version }} --no-git-tag-version
      
      - name: Publish to NPM
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      
      - name: Report published version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "✅ Published @mieweb/news-widget@$VERSION to NPM"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
